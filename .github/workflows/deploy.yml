name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Firebase config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          echo "const FIREBASE_CONFIG = {" > firebase-config.js
          echo "  apiKey:            \"$FIREBASE_API_KEY\"," >> firebase-config.js
          echo "  authDomain:        \"toyboxspacerace.firebaseapp.com\"," >> firebase-config.js
          echo "  databaseURL:       \"$FIREBASE_DATABASE_URL\"," >> firebase-config.js
          echo "  projectId:         \"$FIREBASE_PROJECT_ID\"," >> firebase-config.js
          echo "  storageBucket:     \"toyboxspacerace.firebasestorage.app\"," >> firebase-config.js
          echo "  messagingSenderId: \"$FIREBASE_MESSAGING_SENDER_ID\"," >> firebase-config.js
          echo "  appId:             \"$FIREBASE_APP_ID\"," >> firebase-config.js
          echo "};" >> firebase-config.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
